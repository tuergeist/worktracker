services:
  db:
    image: postgres:16-alpine
    container_name: worktracker-db
    environment:
      - POSTGRES_USER=worktracker
      - POSTGRES_PASSWORD=worktracker
      - POSTGRES_DB=worktracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worktracker"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    build: .
    image: worktracker
    container_name: worktracker-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://worktracker:worktracker@db:5432/worktracker
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  app:
    build: .
    image: worktracker
    container_name: worktracker
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://worktracker:worktracker@db:5432/worktracker
      # Google SSO (from .env). fastapi-users derives the callback URL per request,
      # so no redirect-uri env is needed; Google console must allow
      # http://localhost:8080/api/auth/google/callback for local dev.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      # Needed for /api/analyze-putt (Claude VLM). Set in your shell or a .env file.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped

volumes:
  pgdata:
