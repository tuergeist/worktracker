# Copy to secret.yaml, fill in real values, and apply. DO NOT commit secret.yaml.
#   cp secret.example.yaml secret.yaml && $EDITOR secret.yaml && kubectl apply -f secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: worktracker-secrets
type: Opaque
stringData:
  # Postgres credentials (used by both the StatefulSet and the app's DATABASE_URL)
  POSTGRES_USER: worktracker
  POSTGRES_PASSWORD: change-me
  POSTGRES_DB: worktracker
  # Must match the credentials above; host = the headless service name. Async driver.
  DATABASE_URL: postgresql+asyncpg://worktracker:change-me@worktracker-db:5432/worktracker
  # Google SSO (from Google Cloud Console → Credentials → OAuth client)
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  # Random 32-byte hex for signing session cookies: openssl rand -hex 32
  SESSION_SECRET: ""
  # Optional: enables the green-photo analysis endpoint.
  ANTHROPIC_API_KEY: ""
