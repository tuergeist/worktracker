<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistik · Putten 1m</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #2e7d32;
      --primary-dark:   #1b5e20;
      --primary-light:  #e8f5e9;
      --surface:        #f4f6f4;
      --card:           #ffffff;
      --divider:        #e2e6e2;
      --text-primary:   #1c241c;
      --text-muted:     #6b766b;
      --r-sm: 6px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-pill: 999px;
    }

    html, body {
      min-height: 100vh;
      background: #2a2a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 44px;
      border: 8px solid #1a1a1c;
      box-shadow:
        0 0 0 1px #3a3a3e,
        0 32px 80px rgba(0,0,0,0.7),
        inset 0 0 0 1px #4a4a4e;
      position: relative;
      overflow: hidden;
      background: var(--surface);
    }
    /* Dynamic Island */
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #1a1a1c;
      border-radius: 999px;
      z-index: 100;
    }
    .phone {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
      color: var(--text-primary);
      font-size: 16px;
    }
    .status-bar {
      height: 44px;
      background: var(--card);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 24px 8px;
      flex-shrink: 0;
    }
    .status-bar__time { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; color: var(--text-primary); }
    .status-bar__icons { display: flex; align-items: center; gap: 6px; }
    .status-bar__icons svg { fill: var(--text-primary); }
    .home-indicator {
      height: 34px;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .home-indicator__bar {
      width: 134px;
      height: 5px;
      background: var(--text-primary);
      border-radius: 999px;
      opacity: 0.18;
    }

    /* ── Sticky Header ── */
    .header {
      flex-shrink: 0;
      height: 56px;
      background: var(--card);
      border-bottom: 1px solid var(--divider);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 16px;
    }
    .header__back {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--primary);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      justify-self: start;
    }
    .header__back svg {
      width: 18px;
      height: 18px;
      stroke: var(--primary);
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .header__title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      white-space: nowrap;
    }
    .header__title span {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .header__right {
      justify-self: end;
    }

    /* ── Scrollable content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      padding-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Stats summary grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--r-md);
      padding: 16px 14px 14px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 0 0 1px var(--divider);
    }
    .stat-card.highlight {
      background: var(--primary-light);
      box-shadow: 0 1px 3px rgba(46,125,50,.12), 0 0 0 1px rgba(46,125,50,.18);
    }
    .stat-card__number {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
      letter-spacing: -0.5px;
    }
    .stat-card.highlight .stat-card__number {
      color: var(--primary-dark);
    }
    .stat-card__label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
      line-height: 1.3;
    }

    /* ── Section heading ── */
    .section-heading {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    /* ── Trend chart ── */
    .chart-section {}
    .chart-card {
      background: var(--card);
      border-radius: var(--r-md);
      padding: 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 0 0 1px var(--divider);
    }
    .chart-wrap {
      position: relative;
      width: 100%;
    }
    .chart-wrap svg {
      display: block;
      width: 100%;
    }

    /* ── History list ── */
    .history-section {}
    .history-card {
      background: var(--card);
      border-radius: var(--r-md);
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 0 0 1px var(--divider);
      overflow: hidden;
    }
    .history-row {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 13px 16px;
    }
    .history-row + .history-row {
      border-top: 1px solid var(--divider);
    }
    .history-row__date {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .history-row__dist {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .dist-chip {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      background: var(--primary-light);
      border-radius: var(--r-pill);
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 600;
      color: var(--primary-dark);
    }
    .dist-chip .chip-label {
      font-size: 10px;
      font-weight: 400;
      color: var(--text-muted);
      margin-left: 1px;
    }
    .history-row__total {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: right;
      white-space: nowrap;
    }
    .history-row__total span {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      display: block;
      text-align: right;
    }

    /* ── Bottom tab bar ── */
    .tab-bar {
      flex-shrink: 0;
      height: 64px;
      background: var(--card);
      border-top: 1px solid var(--divider);
      display: flex;
      align-items: stretch;
      position: relative;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      padding-bottom: 6px;
    }
    .tab__icon {
      font-size: 22px;
      line-height: 1;
    }
    .tab__label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .tab.active .tab__label {
      color: var(--primary);
      font-weight: 600;
    }
    .tab.active .tab__icon {
      filter: drop-shadow(0 0 4px rgba(46,125,50,.35));
    }
    .tab-indicator {
      position: absolute;
      bottom: 0;
      height: 2.5px;
      width: calc(100% / 2);
      background: var(--primary);
      border-radius: 2px 2px 0 0;
      left: 0;
      transition: left .2s;
    }
  </style>
</head>
<body>

<div class="phone-frame">
<div class="phone">
  <!-- iOS Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 9.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm0-3.5a6 6 0 014.24 1.76l-1.42 1.42A4 4 0 008 8a4 4 0 00-2.83 1.18L3.76 7.76A6 6 0 018 6zm0-3.5a9.5 9.5 0 016.72 2.78l-1.42 1.42A7.5 7.5 0 008 4.5a7.5 7.5 0 00-5.3 2.2L1.28 5.28A9.5 9.5 0 018 2.5z" fill-rule="evenodd"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2.5" stroke="currentColor" stroke-width="1" fill="none"/><rect x="22" y="3.5" width="2" height="5" rx="1" fill="currentColor"/><rect x="1.5" y="2.5" width="16" height="7" rx="1.5" fill="currentColor"/></svg>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       HEADER
  ════════════════════════════════════════ -->
  <header class="header">
    <button class="header__back">
      <!-- chevron-left -->
      <svg viewBox="0 0 24 24">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Zurück
    </button>

    <div class="header__title">
      Statistik
      <span>Putten · 1 m</span>
    </div>

    <div class="header__right"></div>
  </header>

  <!-- ════════════════════════════════════════
       CONTENT
  ════════════════════════════════════════ -->
  <main class="content">

    <!-- ── Stats summary 2×2 ── -->
    <section>
      <div class="stats-grid">

        <div class="stat-card">
          <div class="stat-card__number">3</div>
          <div class="stat-card__label">Sessions</div>
        </div>

        <div class="stat-card highlight">
          <div class="stat-card__number">10</div>
          <div class="stat-card__label">Bestwert Putts</div>
        </div>

        <div class="stat-card">
          <div class="stat-card__number">11.7</div>
          <div class="stat-card__label">Ø Putts pro Session</div>
        </div>

        <div class="stat-card highlight">
          <div class="stat-card__number">100%</div>
          <div class="stat-card__label">1-Putt-Quote</div>
        </div>

      </div>
    </section>

    <!-- ── Trend chart ── -->
    <section class="chart-section">
      <div class="section-heading">Verlauf</div>
      <div class="chart-card">
        <div class="chart-wrap">
          <svg viewBox="0 0 358 148" xmlns="http://www.w3.org/2000/svg">

            <!-- Y-axis labels -->
            <text x="14" y="42" font-size="10" fill="#6b766b" font-family="system-ui" text-anchor="end">16</text>
            <text x="14" y="122" font-size="10" fill="#6b766b" font-family="system-ui" text-anchor="end">9</text>

            <!-- Horizontal grid lines (subtle) -->
            <line x1="20" y1="38" x2="338" y2="38" stroke="#e2e6e2" stroke-width="1"/>
            <line x1="20" y1="120" x2="338" y2="120" stroke="#e2e6e2" stroke-width="1"/>

            <!-- Gradient fill under the line -->
            <defs>
              <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#2e7d32" stop-opacity="0.18"/>
                <stop offset="100%" stop-color="#2e7d32" stop-opacity="0.0"/>
              </linearGradient>
            </defs>

            <!-- Area fill -->
            <path
              d="M40,105.7 L179,105.7 L318,34.3 L318,120 L179,120 L40,120 Z"
              fill="url(#areaGrad)"
            />

            <!-- Line -->
            <polyline
              points="40,105.7 179,105.7 318,34.3"
              fill="none"
              stroke="#2e7d32"
              stroke-width="2.5"
              stroke-linejoin="round"
              stroke-linecap="round"
            />

            <!-- Data point dots -->
            <circle cx="40"  cy="105.7" r="4.5" fill="#2e7d32" stroke="white" stroke-width="2"/>
            <circle cx="179" cy="105.7" r="4.5" fill="#2e7d32" stroke="white" stroke-width="2"/>
            <circle cx="318" cy="34.3"  r="4.5" fill="#2e7d32" stroke="white" stroke-width="2"/>

            <!-- Value labels above dots -->
            <text x="40"  y="100" font-size="11" font-weight="600" fill="#2e7d32" font-family="system-ui" text-anchor="middle">10</text>
            <text x="179" y="100" font-size="11" font-weight="600" fill="#2e7d32" font-family="system-ui" text-anchor="middle">10</text>
            <text x="318" y="28"  font-size="11" font-weight="600" fill="#2e7d32" font-family="system-ui" text-anchor="middle">15</text>

            <!-- X-axis baseline -->
            <line x1="20" y1="120" x2="338" y2="120" stroke="#cdd1cd" stroke-width="1"/>

            <!-- X-axis date labels -->
            <text x="40"  y="136" font-size="10" fill="#6b766b" font-family="system-ui" text-anchor="middle">18.06</text>
            <text x="179" y="136" font-size="10" fill="#6b766b" font-family="system-ui" text-anchor="middle">18.06</text>
            <text x="318" y="136" font-size="10" fill="#6b766b" font-family="system-ui" text-anchor="middle">18.06</text>

          </svg>
        </div>
      </div>
    </section>

    <!-- ── History list ── -->
    <section class="history-section">
      <div class="section-heading">Letzte Sessions</div>
      <div class="history-card">

        <!-- Row 1 -->
        <div class="history-row">
          <div class="history-row__date">18.06.26</div>
          <div class="history-row__dist">
            <span class="dist-chip">7 <span class="chip-label">1×</span></span>
            <span class="dist-chip">2 <span class="chip-label">2×</span></span>
            <span class="dist-chip">1 <span class="chip-label">3×</span></span>
            <span class="dist-chip">0 <span class="chip-label">4+</span></span>
          </div>
          <div class="history-row__total">10 <span>Putts</span></div>
        </div>

        <!-- Row 2 -->
        <div class="history-row">
          <div class="history-row__date">18.06.26</div>
          <div class="history-row__dist">
            <span class="dist-chip">7 <span class="chip-label">1×</span></span>
            <span class="dist-chip">2 <span class="chip-label">2×</span></span>
            <span class="dist-chip">1 <span class="chip-label">3×</span></span>
            <span class="dist-chip">0 <span class="chip-label">4+</span></span>
          </div>
          <div class="history-row__total">10 <span>Putts</span></div>
        </div>

        <!-- Row 3 -->
        <div class="history-row">
          <div class="history-row__date">18.06.26</div>
          <div class="history-row__dist">
            <span class="dist-chip">1 <span class="chip-label">1×</span></span>
            <span class="dist-chip">5 <span class="chip-label">2×</span></span>
            <span class="dist-chip">3 <span class="chip-label">3×</span></span>
            <span class="dist-chip">1 <span class="chip-label">4+</span></span>
          </div>
          <div class="history-row__total">15 <span>Putts</span></div>
        </div>

      </div>
    </section>

  </main>

  <!-- ════════════════════════════════════════
       BOTTOM TAB BAR
  ════════════════════════════════════════ -->
  <nav class="tab-bar">
    <div class="tab-indicator"></div>

    <!-- Tab 1: Putten (active) -->
    <div class="tab active">
      <div class="tab__icon">🥅</div>
      <div class="tab__label">Putten</div>
    </div>

    <!-- Tab 2: Range (inactive) -->
    <div class="tab">
      <div class="tab__icon">🎯</div>
      <div class="tab__label">Range</div>
    </div>
  </nav>

  <div class="home-indicator"><div class="home-indicator__bar"></div></div>
</div>
</div>

</body>
</html>
