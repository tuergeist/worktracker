<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>Golf Training – Range Aufnahme</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #2e7d32;
      --primary-dark:   #1b5e20;
      --primary-light:  #e8f5e9;
      --surface:        #f4f6f4;
      --card:           #ffffff;
      --divider:        #e2e6e2;
      --text-primary:   #1c241c;
      --text-muted:     #6b766b;
      --r-sm:           6px;
      --r-md:           12px;
      --r-lg:           16px;
      --r-pill:         999px;
      --touch-min:      48px;
    }

    /* ── Outer presentation page ────────────────────────────── */
    html, body {
      min-height: 100vh;
      background: #2a2a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Phone frame ────────────────────────────────────────── */
    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 44px;
      border: 8px solid #1a1a1c;
      box-shadow:
        0 0 0 1px #3a3a3e,
        0 32px 80px rgba(0,0,0,0.7),
        inset 0 0 0 1px #4a4a4e;
      position: relative;
      overflow: hidden;
      background: var(--surface);
    }

    /* Dynamic Island / notch */
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #1a1a1c;
      border-radius: var(--r-pill);
      z-index: 100;
    }

    /* ── Inner phone shell ──────────────────────────────────── */
    .phone {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }

    /* ── iOS status bar ─────────────────────────────────────── */
    .status-bar {
      height: 44px;
      background: var(--card);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 24px 8px;
      flex-shrink: 0;
    }
    .status-bar__time {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }
    .status-bar__icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-bar__icons svg {
      fill: var(--text-primary);
    }

    /* ── App header ─────────────────────────────────────────── */
    .app-header {
      height: 56px;
      background: var(--card);
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      flex-shrink: 0;
    }

    .player-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 600;
      padding: 0 10px 0 6px;
      height: 36px;
      border-radius: var(--r-pill);
      cursor: pointer;
      border: none;
      outline: none;
    }
    .player-chip__avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .player-chip__caret {
      font-size: 10px;
      opacity: 0.7;
    }

    .app-header__center {
      font-size: 22px;
      line-height: 1;
    }

    .settings-btn {
      width: 36px;
      height: 36px;
      background: var(--surface);
      border: 1.5px solid var(--divider);
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--text-muted);
      cursor: pointer;
      letter-spacing: -1px;
      line-height: 1;
      padding-bottom: 4px;
    }

    /* ── Club picker strip ──────────────────────────────────── */
    .club-strip {
      height: 52px;
      background: var(--card);
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .club-chip--selected {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 0 10px 0 5px;
      height: 36px;
      border-radius: var(--r-pill);
      cursor: pointer;
      flex-shrink: 0;
    }
    .club-badge {
      background: rgba(255,255,255,0.22);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: var(--r-sm);
      letter-spacing: 0.2px;
    }
    .club-chip--selected .caret {
      font-size: 10px;
      opacity: 0.8;
      margin-left: 2px;
    }

    .club-divider {
      width: 1px;
      height: 24px;
      background: var(--divider);
      flex-shrink: 0;
    }

    .club-secondary {
      display: flex;
      align-items: center;
      gap: 4px;
      overflow: hidden;
    }
    .club-secondary__item {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      padding: 0 6px;
      height: 32px;
      display: flex;
      align-items: center;
    }
    .club-secondary__dot {
      font-size: 11px;
      color: var(--divider);
    }

    /* ── Recording area ─────────────────────────────────────── */
    .recording-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 14px 20px 10px;
      gap: 0;
      min-height: 0;
      background: var(--surface);
    }

    /* Session summary line */
    .session-summary {
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 16px;
      letter-spacing: 0.2px;
    }

    /* Distance label */
    .distance-label {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 400;
      margin-bottom: 4px;
      letter-spacing: 0.1px;
    }

    /* HUGE number display */
    .distance-display {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      padding-bottom: 6px;
      border-bottom: 2.5px solid var(--primary);
      margin: 0 20px;
    }
    .distance-display__number {
      font-size: 72px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
      letter-spacing: -3px;
    }
    .distance-display__unit {
      font-size: 22px;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1;
      padding-bottom: 8px;
    }
    /* Blinking cursor */
    .distance-display__cursor {
      width: 2.5px;
      height: 52px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 8px;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .distance-prev {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 7px;
      margin-bottom: 18px;
      letter-spacing: 0.1px;
    }

    /* Thin divider */
    .section-divider {
      height: 1px;
      background: var(--divider);
      margin: 0 0 12px;
    }

    /* Tag section label */
    .tag-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 9px;
    }

    /* Tag row */
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 16px;
    }

    .tag-pill {
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 13px;
      border-radius: var(--r-pill);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--divider);
      background: var(--card);
      color: var(--text-muted);
      letter-spacing: 0.1px;
    }
    .tag-pill--active {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary-dark);
      font-weight: 600;
    }

    /* Shot preview card */
    .shot-preview {
      background: var(--card);
      border: 1px solid var(--divider);
      border-radius: var(--r-md);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .shot-preview__label {
      color: var(--text-muted);
      font-weight: 400;
    }
    .shot-preview__value {
      color: var(--text-primary);
      font-weight: 600;
    }
    .shot-preview__badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 9px;
      background: var(--primary-light);
      border: 1px solid var(--primary);
      color: var(--primary-dark);
      font-size: 11px;
      font-weight: 600;
      border-radius: var(--r-pill);
      letter-spacing: 0.1px;
    }
    .shot-preview__spacer {
      flex: 1;
    }

    /* ── Footer action bar ──────────────────────────────────── */
    .footer-bar {
      background: var(--card);
      border-top: 1px solid var(--divider);
      padding: 12px 16px 0;
      flex-shrink: 0;
    }

    .btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      height: 56px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: var(--r-lg);
      cursor: pointer;
      letter-spacing: 0.2px;
      box-shadow: 0 4px 14px rgba(46,125,50,0.35);
      transition: background 0.15s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-save:active {
      background: var(--primary-dark);
      transform: scale(0.985);
    }
    .btn-save__icon {
      font-size: 17px;
    }

    .footer-stat-link {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      gap: 4px;
      cursor: pointer;
      font-weight: 500;
    }

    /* ── Bottom tab bar ─────────────────────────────────────── */
    .tab-bar {
      height: 56px;
      background: var(--card);
      border-top: 1px solid var(--divider);
      display: flex;
      align-items: stretch;
      flex-shrink: 0;
    }

    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .tab-item__icon {
      font-size: 22px;
      line-height: 1;
    }

    .tab-item__label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .tab-item--active .tab-item__icon,
    .tab-item--active .tab-item__label {
      color: var(--primary);
    }

    .tab-item--inactive .tab-item__icon,
    .tab-item--inactive .tab-item__label {
      color: #9eaa9e;
    }

    /* Active indicator line at top */
    .tab-item--active::before {
      content: '';
      position: absolute;
      top: 0;
      width: 32px;
      height: 2px;
      background: var(--primary);
      border-radius: 0 0 var(--r-pill) var(--r-pill);
    }

    /* ── iOS home indicator ─────────────────────────────────── */
    .home-indicator {
      height: 34px;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .home-indicator__bar {
      width: 134px;
      height: 5px;
      background: var(--text-primary);
      border-radius: var(--r-pill);
      opacity: 0.18;
    }
  </style>
</head>
<body>

<div class="phone-frame">
<div class="phone">

  <!-- iOS Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <!-- Signal bars -->
      <svg width="17" height="12" viewBox="0 0 17 12">
        <rect x="0"   y="8"   width="3" height="4"  rx="0.5" opacity="1"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="0.5" opacity="1"/>
        <rect x="9"   y="3"   width="3" height="9"  rx="0.5" opacity="1"/>
        <rect x="13.5" y="0"  width="3" height="12" rx="0.5" opacity="0.3"/>
      </svg>
      <!-- WiFi -->
      <svg width="16" height="12" viewBox="0 0 16 12">
        <path d="M8 9.5 a1.5 1.5 0 1 1 0 .001Z" fill-rule="evenodd"/>
        <path d="M3.8 6.8 a6 6 0 0 1 8.4 0" stroke="#1c241c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8"/>
        <path d="M1.2 4.2 a9.6 9.6 0 0 1 13.6 0" stroke="#1c241c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
      </svg>
      <!-- Battery -->
      <svg width="25" height="12" viewBox="0 0 25 12">
        <rect x="0" y="1" width="21" height="10" rx="2.5" stroke="#1c241c" stroke-width="1" fill="none" opacity="0.35"/>
        <rect x="1.5" y="2.5" width="17" height="7" rx="1.5" fill="#1c241c" opacity="0.9"/>
        <path d="M22 4.5 v3 a1.5 1.5 0 0 0 0-3Z" fill="#1c241c" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- App Header -->
  <div class="app-header">
    <button class="player-chip" aria-label="Spieler wechseln">
      <span class="player-chip__avatar">MB</span>
      Markus
      <span class="player-chip__caret">▾</span>
    </button>

    <span class="app-header__center">⛳</span>

    <button class="settings-btn" aria-label="Einstellungen">⋯</button>
  </div>

  <!-- Club Picker Strip -->
  <div class="club-strip" role="toolbar" aria-label="Schlägerwahl">
    <button class="club-chip--selected" aria-pressed="true" aria-label="Driver ausgewählt">
      <span class="club-badge">Dr</span>
      Driver
      <span class="caret">▾</span>
    </button>
    <div class="club-divider"></div>
    <div class="club-secondary" aria-label="Weitere Schläger">
      <span class="club-secondary__item">3W</span>
      <span class="club-secondary__dot">·</span>
      <span class="club-secondary__item">5i</span>
      <span class="club-secondary__dot">·</span>
      <span class="club-secondary__item">7i</span>
      <span class="club-secondary__dot">·</span>
      <span class="club-secondary__item">PW</span>
      <span class="club-secondary__dot">·</span>
      <span class="club-secondary__item">SW</span>
    </div>
  </div>

  <!-- Recording Area -->
  <div class="recording-area">

    <!-- Session summary -->
    <p class="session-summary">5 Schläge&nbsp;&nbsp;·&nbsp;&nbsp;Ø 146 m</p>

    <!-- Distance label -->
    <p class="distance-label">Weite (m)</p>

    <!-- HUGE number display -->
    <div class="distance-display" role="textbox" aria-label="Weite eingeben" aria-valuenow="148">
      <span class="distance-display__number">148</span>
      <span class="distance-display__unit">m</span>
      <span class="distance-display__cursor" aria-hidden="true"></span>
    </div>

    <p class="distance-prev">Letzter: 145 m</p>

    <!-- Divider -->
    <div class="section-divider" role="separator"></div>

    <!-- Tag section -->
    <p class="tag-section-label">Schlagqualität</p>

    <div class="tag-row" role="group" aria-label="Schlagqualität auswählen">
      <button class="tag-pill" aria-pressed="false">fett</button>
      <button class="tag-pill" aria-pressed="false">getoppt</button>
      <button class="tag-pill" aria-pressed="false">dünn</button>
      <button class="tag-pill tag-pill--active" aria-pressed="true">sauber</button>
      <button class="tag-pill" aria-pressed="false">slice</button>
      <button class="tag-pill" aria-pressed="false">hook</button>
    </div>

    <!-- Shot preview -->
    <div class="shot-preview" role="status" aria-label="Aktueller Schlag">
      <span class="shot-preview__label">Aktuell:</span>
      <span class="shot-preview__value">148 m</span>
      <span class="shot-preview__spacer"></span>
      <span class="shot-preview__badge">sauber</span>
    </div>

  </div><!-- /recording-area -->

  <!-- Footer Action Bar -->
  <div class="footer-bar">
    <button class="btn-save" aria-label="Schlag speichern">
      <span class="btn-save__icon">💾</span>
      Speichern
    </button>
    <a class="footer-stat-link" href="#" aria-label="Zur Statistik">
      Statistik&nbsp;→
    </a>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="tab-bar" role="tablist">
    <div class="tab-item tab-item--inactive" role="tab" aria-selected="false">
      <span class="tab-item__icon">🥅</span>
      <span class="tab-item__label">Putten</span>
    </div>
    <div class="tab-item tab-item--active" role="tab" aria-selected="true">
      <span class="tab-item__icon">🎯</span>
      <span class="tab-item__label">Range</span>
    </div>
  </div>

  <!-- iOS Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator__bar"></div>
  </div>

</div><!-- /phone -->
</div><!-- /phone-frame -->

</body>
</html>
