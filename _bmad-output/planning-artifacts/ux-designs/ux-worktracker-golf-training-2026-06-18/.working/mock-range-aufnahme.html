<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>Golf Training – Range Aufnahme</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #2e7d32;
      --primary-dark:   #1b5e20;
      --primary-light:  #e8f5e9;
      --surface:        #f4f6f4;
      --card:           #ffffff;
      --divider:        #e2e6e2;
      --text-primary:   #1c241c;
      --text-muted:     #6b766b;
      --r-sm:           6px;
      --r-md:           12px;
      --r-lg:           16px;
      --r-pill:         999px;
      --touch-min:      48px;
    }

    /* ── Outer presentation page ────────────────────────────── */
    html, body {
      min-height: 100vh;
      background: #2a2a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Phone frame ────────────────────────────────────────── */
    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 44px;
      border: 8px solid #1a1a1c;
      box-shadow:
        0 0 0 1px #3a3a3e,
        0 32px 80px rgba(0,0,0,0.7),
        inset 0 0 0 1px #4a4a4e;
      position: relative;
      overflow: hidden;
      background: var(--surface);
    }

    /* Dynamic Island */
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #1a1a1c;
      border-radius: var(--r-pill);
      z-index: 100;
    }

    /* ── Inner phone shell ──────────────────────────────────── */
    .phone {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }

    /* ── iOS status bar ─────────────────────────────────────── */
    .status-bar {
      height: 44px;
      background: var(--card);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 24px 8px;
      flex-shrink: 0;
    }
    .status-bar__time {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }
    .status-bar__icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-bar__icons svg {
      fill: var(--text-primary);
    }

    /* ── App header ─────────────────────────────────────────── */
    .app-header {
      height: 56px;
      background: var(--card);
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      flex-shrink: 0;
    }

    .player-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 600;
      padding: 0 10px 0 6px;
      height: 36px;
      border-radius: var(--r-pill);
      cursor: pointer;
      border: none;
      outline: none;
    }
    .player-chip__avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .player-chip__caret {
      font-size: 10px;
      opacity: 0.7;
    }

    .app-header__center {
      font-size: 22px;
      line-height: 1;
    }

    .settings-btn {
      width: 36px;
      height: 36px;
      background: var(--surface);
      border: 1.5px solid var(--divider);
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--text-muted);
      cursor: pointer;
      letter-spacing: -1px;
      line-height: 1;
      padding-bottom: 4px;
    }

    /* ── Club picker strip ──────────────────────────────────── */
    .club-strip {
      height: 52px;
      background: var(--card);
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .club-chip--selected {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 0 10px 0 5px;
      height: 36px;
      border-radius: var(--r-pill);
      cursor: pointer;
      flex-shrink: 0;
    }
    .club-badge {
      background: rgba(255,255,255,0.22);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: var(--r-sm);
      letter-spacing: 0.2px;
    }
    .club-chip--selected .caret {
      font-size: 10px;
      opacity: 0.8;
      margin-left: 2px;
    }

    .club-divider {
      width: 1px;
      height: 24px;
      background: var(--divider);
      flex-shrink: 0;
    }

    .club-secondary {
      display: flex;
      align-items: center;
      gap: 4px;
      overflow: hidden;
    }
    .club-secondary__item {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      padding: 0 6px;
      height: 32px;
      display: flex;
      align-items: center;
    }
    .club-secondary__dot {
      font-size: 11px;
      color: var(--divider);
    }

    /* ── Recording area ─────────────────────────────────────── */
    .recording-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px 16px 10px;
      gap: 0;
      min-height: 0;
      background: var(--surface);
    }

    /* Session summary line */
    .session-summary {
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 12px;
      letter-spacing: 0.2px;
    }

    /* Distance buckets */
    .bucket-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 10px;
    }

    .bucket {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 40px;
      border-radius: var(--r-md);
      border: 1.5px solid var(--divider);
      background: var(--card);
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      letter-spacing: 0.1px;
    }
    .bucket--selected {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 3px 10px rgba(46,125,50,0.3);
    }

    /* Exact override row */
    .exact-override {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 10px;
    }
    .exact-override__label {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .exact-override__chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #ffffff;
      border: 1px solid var(--divider);
      border-radius: var(--r-pill);
      padding: 4px 12px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      line-height: 1;
    }
    .exact-override__chip svg {
      flex-shrink: 0;
      opacity: 0.5;
    }

    /* Direction toggle */
    .direction-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 10px;
      border-radius: var(--r-md);
      overflow: hidden;
      border: 1.5px solid var(--divider);
    }
    .dir-btn {
      flex: 1;
      height: 48px;
      border: none;
      background: var(--card);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      letter-spacing: 0.1px;
      border-right: 1px solid var(--divider);
    }
    .dir-btn:last-child {
      border-right: none;
    }
    .dir-btn--selected {
      background: var(--primary);
      color: #fff;
    }

    /* Shot quality tag row */
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }
    .tag-pill {
      border: 1px solid var(--divider);
      background: white;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.82rem;
      color: var(--text-primary);
      cursor: pointer;
    }
    .tag-pill.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* ── Footer action bar ──────────────────────────────────── */
    .footer-bar {
      background: var(--card);
      border-top: 1px solid var(--divider);
      padding: 12px 16px 0;
      flex-shrink: 0;
    }

    .btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      height: 56px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: var(--r-lg);
      cursor: pointer;
      letter-spacing: 0.2px;
      box-shadow: 0 4px 14px rgba(46,125,50,0.35);
      transition: background 0.15s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-save:active {
      background: var(--primary-dark);
      transform: scale(0.985);
    }

    .footer-stat-link {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      gap: 4px;
      cursor: pointer;
      font-weight: 500;
    }

    /* ── Bottom tab bar ─────────────────────────────────────── */
    .tab-bar {
      display: flex;
      flex-shrink: 0;
      background: var(--card);
      border-top: 1px solid var(--divider);
      height: 56px;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
    }
    .tab-item--active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .tab-item svg {
      stroke: currentColor;
    }

    /* ── iOS home indicator ─────────────────────────────────── */
    .home-indicator {
      height: 34px;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .home-indicator__bar {
      width: 134px;
      height: 5px;
      background: var(--text-primary);
      border-radius: var(--r-pill);
      opacity: 0.18;
    }
  </style>
</head>
<body>

<div class="phone-frame">
<div class="phone">

  <!-- iOS Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <!-- Signal bars -->
      <svg width="17" height="12" viewBox="0 0 17 12">
        <rect x="0"   y="8"   width="3" height="4"  rx="0.5" opacity="1"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="0.5" opacity="1"/>
        <rect x="9"   y="3"   width="3" height="9"  rx="0.5" opacity="1"/>
        <rect x="13.5" y="0"  width="3" height="12" rx="0.5" opacity="0.3"/>
      </svg>
      <!-- WiFi -->
      <svg width="16" height="12" viewBox="0 0 16 12">
        <path d="M8 9.5 a1.5 1.5 0 1 1 0 .001Z" fill-rule="evenodd"/>
        <path d="M3.8 6.8 a6 6 0 0 1 8.4 0" stroke="#1c241c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8"/>
        <path d="M1.2 4.2 a9.6 9.6 0 0 1 13.6 0" stroke="#1c241c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
      </svg>
      <!-- Battery -->
      <svg width="25" height="12" viewBox="0 0 25 12">
        <rect x="0" y="1" width="21" height="10" rx="2.5" stroke="#1c241c" stroke-width="1" fill="none" opacity="0.35"/>
        <rect x="1.5" y="2.5" width="17" height="7" rx="1.5" fill="#1c241c" opacity="0.9"/>
        <path d="M22 4.5 v3 a1.5 1.5 0 0 0 0-3Z" fill="#1c241c" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- App Header -->
  <div class="app-header">
    <span></span>

    <span class="app-header__center">&#9971;</span>

    <button class="settings-btn" aria-label="Einstellungen">&#9881;</button>
  </div>

  <!-- Club Picker Strip -->
  <div class="club-strip" role="toolbar" aria-label="Schlägerwahl">
    <button class="club-chip--selected" aria-pressed="true" aria-label="Driver ausgewählt">
      <span class="club-badge">Dr</span>
      Driver
      <span class="caret">&#9662;</span>
    </button>
    <div class="club-divider"></div>
    <div class="club-secondary" aria-label="Weitere Schläger">
      <span class="club-secondary__item">3W</span>
      <span class="club-secondary__dot">&middot;</span>
      <span class="club-secondary__item">5i</span>
      <span class="club-secondary__dot">&middot;</span>
      <span class="club-secondary__item">7i</span>
      <span class="club-secondary__dot">&middot;</span>
      <span class="club-secondary__item">PW</span>
      <span class="club-secondary__dot">&middot;</span>
      <span class="club-secondary__item">SW</span>
    </div>
  </div>

  <!-- Recording Area -->
  <div class="recording-area">

    <!-- Session summary -->
    <p class="session-summary">5 Schl&auml;ge &nbsp;&middot;&nbsp; &Oslash; 146 m</p>

    <!-- Distance buckets -->
    <div class="bucket-list" role="group" aria-label="Weite w&auml;hlen">
      <button class="bucket" aria-pressed="false">&lt; 150 m</button>
      <button class="bucket bucket--selected" aria-pressed="true">150 &ndash; 190 m</button>
      <button class="bucket" aria-pressed="false">190 &ndash; 220 m</button>
      <button class="bucket" aria-pressed="false">220 &ndash; 250 m</button>
      <button class="bucket" aria-pressed="false">&gt; 250 m</button>
    </div>

    <!-- Exact override row -->
    <div class="exact-override">
      <span class="exact-override__label">oder genau:</span>
      <button class="exact-override__chip" aria-label="Genaue Weite eingeben">
        170 m
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9.5 1.5a1.414 1.414 0 0 1 2 2L4 11H1.5V8.5L9.5 1.5Z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Shot quality tags -->
    <div class="tag-row" role="group" aria-label="Schlagqualität">
      <span class="tag-pill">fett</span>
      <span class="tag-pill">getoppt</span>
      <span class="tag-pill">dünn</span>
      <span class="tag-pill active">sauber</span>
      <span class="tag-pill">slice</span>
      <span class="tag-pill">hook</span>
    </div>

    <!-- Direction toggle -->
    <div class="direction-toggle" role="group" aria-label="Richtung">
      <button class="dir-btn" aria-pressed="false">&#8592; Links</button>
      <button class="dir-btn dir-btn--selected" aria-pressed="true">Gerade</button>
      <button class="dir-btn" aria-pressed="false">Rechts &#8594;</button>
    </div>

  </div><!-- /recording-area -->

  <!-- Footer Action Bar -->
  <div class="footer-bar">
    <button class="btn-save" aria-label="Schlag speichern">
      Speichern
    </button>
    <a class="footer-stat-link" href="#" aria-label="Zur Statistik">
      Statistik&nbsp;&rarr;
    </a>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      <span>Putten</span>
    </button>
    <button class="tab-item tab-item--active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M12 3l9 9-9 9"/></svg>
      <span>Range</span>
    </button>
  </nav>

  <!-- iOS Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator__bar"></div>
  </div>

</div><!-- /phone -->
</div><!-- /phone-frame -->

</body>
</html>
