<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>Golf Training – Putten Aufnahme</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #2e7d32;
      --primary-dark:   #1b5e20;
      --primary-light:  #e8f5e9;
      --surface:        #f4f6f4;
      --card:           #ffffff;
      --divider:        #e2e6e2;
      --text-primary:   #1c241c;
      --text-muted:     #6b766b;
      --error:          #c62828;
      --r-sm:           6px;
      --r-md:           12px;
      --r-lg:           16px;
      --r-pill:         999px;
      --touch-min:      48px;
    }

    html, body {
      min-height: 100vh;
      background: #2a2a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 44px;
      border: 8px solid #1a1a1c;
      box-shadow:
        0 0 0 1px #3a3a3e,
        0 32px 80px rgba(0,0,0,0.7),
        inset 0 0 0 1px #4a4a4e;
      position: relative;
      overflow: hidden;
      background: var(--surface);
    }
    /* Dynamic Island */
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #1a1a1c;
      border-radius: 999px;
      z-index: 100;
    }
    .phone {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }

    /* ── iOS status bar simulation ──────────────────────────── */
    .status-bar {
      height: 44px;
      background: var(--card);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 24px 8px;
      flex-shrink: 0;
    }
    .status-bar__time {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }
    .status-bar__icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-bar__icons svg {
      fill: var(--text-primary);
    }

    /* ── App header ─────────────────────────────────────────── */
    .app-header {
      height: 56px;
      background: var(--card);
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .player-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: var(--r-pill);
      min-height: var(--touch-min);
      cursor: pointer;
      border: none;
      outline: none;
    }
    .player-chip__caret {
      font-size: 10px;
      opacity: 0.7;
    }

    .app-header__title {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .app-header__icon {
      font-size: 18px;
      line-height: 1;
    }
    .app-header__name {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .app-header__right {
      width: 36px; /* mirror left spacer for centering */
      display: flex;
      justify-content: flex-end;
    }

    .settings-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid var(--divider);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      outline: none;
      flex-shrink: 0;
    }
    .settings-btn svg {
      width: 18px;
      height: 18px;
      fill: var(--text-muted);
    }

    /* ── Picker strip ───────────────────────────────────────── */
    .picker-strip {
      height: 52px;
      background: var(--card);
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .exercise-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1.5px solid var(--divider);
      border-radius: var(--r-md);
      padding: 0 14px;
      height: 36px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
    }
    .exercise-chip__label {
      color: var(--text-muted);
      font-weight: 400;
    }
    .exercise-chip__caret {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 2px;
    }

    /* ── Recording area ─────────────────────────────────────── */
    .recording-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px 12px 8px;
      gap: 10px;
      min-height: 0;
    }

    .counter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    /* ── Counter cell ───────────────────────────────────────── */
    .counter-cell {
      background: var(--card);
      border-radius: var(--r-lg);
      border: 1.5px solid var(--divider);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 8px;
      position: relative;
      min-height: 120px;
      transition: border-color 0.15s;
    }

    .counter-cell--active {
      border-color: var(--primary);
      background: linear-gradient(145deg, #ffffff 0%, #f6faf6 100%);
    }

    .counter-cell__label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .counter-cell--active .counter-cell__label {
      color: var(--primary-dark);
    }

    .counter-cell__controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 100%;
    }

    .counter-btn {
      width: 48px;
      height: 48px;
      border-radius: var(--r-md);
      border: none;
      background: var(--surface);
      color: var(--text-primary);
      font-size: 22px;
      font-weight: 300;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }

    .counter-btn:active {
      background: var(--divider);
      transform: scale(0.94);
    }

    .counter-btn--minus {
      color: var(--text-muted);
    }

    .counter-btn--plus {
      color: var(--primary);
      background: var(--primary-light);
    }

    .counter-btn--plus:active {
      background: #c8e6c9;
    }

    .counter-cell--active .counter-btn--plus {
      background: var(--primary);
      color: #fff;
    }

    .counter-cell--active .counter-btn--plus:active {
      background: var(--primary-dark);
    }

    .counter-cell__value {
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
      min-width: 56px;
      text-align: center;
      letter-spacing: -2px;
    }

    .counter-cell--active .counter-cell__value {
      color: var(--primary-dark);
    }

    .counter-cell--zero .counter-cell__value {
      color: var(--divider);
    }

    /* Dot indicator at top-right of cell */
    .counter-cell__dot {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0;
    }
    .counter-cell--active .counter-cell__dot {
      opacity: 1;
    }

    /* ── Progress indicator ─────────────────────────────────── */
    .progress-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 28px;
      flex-shrink: 0;
    }

    .progress-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--divider);
      border-radius: var(--r-pill);
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 100%;
      background: var(--primary);
      border-radius: var(--r-pill);
      transition: width 0.3s ease;
    }

    .progress-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .progress-label--complete {
      color: var(--primary);
    }

    .progress-checkmark {
      font-size: 14px;
      color: var(--primary);
    }

    /* ── Footer action bar ──────────────────────────────────── */
    .footer-bar {
      background: var(--card);
      border-top: 1px solid var(--divider);
      padding: 12px 16px 0;
      flex-shrink: 0;
    }

    .btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 52px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: var(--r-md);
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.15s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-save:active {
      background: var(--primary-dark);
      transform: scale(0.985);
    }

    .footer-stat-link {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      gap: 4px;
      cursor: pointer;
    }

    .footer-stat-link:hover {
      color: var(--primary);
    }

    /* ── Bottom tab bar ─────────────────────────────────────── */
    .tab-bar {
      display: flex;
      flex-shrink: 0;
      background: var(--card);
      border-top: 1px solid var(--divider);
      height: 56px;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
    }
    .tab-item--active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .tab-item svg {
      stroke: currentColor;
    }

    /* ── iOS home indicator ─────────────────────────────────── */
    .home-indicator {
      height: 34px;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .home-indicator__bar {
      width: 134px;
      height: 5px;
      background: var(--text-primary);
      border-radius: var(--r-pill);
      opacity: 0.18;
    }
  </style>
</head>
<body>
<div class="phone-frame">
<div class="phone">

  <!-- iOS Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <!-- Signal bars -->
      <svg width="17" height="12" viewBox="0 0 17 12">
        <rect x="0"  y="8"  width="3" height="4" rx="0.5" opacity="1"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="0.5" opacity="1"/>
        <rect x="9"  y="3"  width="3" height="9" rx="0.5" opacity="1"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5" opacity="0.3"/>
      </svg>
      <!-- WiFi -->
      <svg width="16" height="12" viewBox="0 0 16 12">
        <path d="M8 9.5 a1.5 1.5 0 1 1 0 .001Z" fill-rule="evenodd"/>
        <path d="M3.8 6.8 a6 6 0 0 1 8.4 0" stroke="#1c241c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8"/>
        <path d="M1.2 4.2 a9.6 9.6 0 0 1 13.6 0" stroke="#1c241c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
      </svg>
      <!-- Battery -->
      <svg width="25" height="12" viewBox="0 0 25 12">
        <rect x="0" y="1" width="21" height="10" rx="2.5" stroke="#1c241c" stroke-width="1" fill="none" opacity="0.35"/>
        <rect x="1.5" y="2.5" width="17" height="7" rx="1.5" fill="#1c241c" opacity="0.9"/>
        <path d="M22 4.5 v3 a1.5 1.5 0 0 0 0-3Z" fill="#1c241c" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- App Header -->
  <div class="app-header">
    <div style="width:36px;flex-shrink:0;"></div>

    <div class="app-header__title">
      <span class="app-header__icon">⛳</span>
    </div>

    <div class="app-header__right">
      <button class="settings-btn" aria-label="Einstellungen">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08 0-.39-.03-.74-.07-1.08l2.32-1.82c.21-.16.27-.46.13-.7l-2.2-3.81c-.13-.25-.42-.33-.67-.25l-2.74 1.1c-.57-.44-1.18-.81-1.86-1.08l-.42-2.92C14.5 2.18 14.25 2 14 2h-4c-.25 0-.5.18-.54.42l-.42 2.92c-.68.27-1.29.64-1.86 1.08L4.44 5.32c-.25-.08-.54 0-.67.25L1.57 9.38c-.14.24-.08.54.13.7l2.32 1.82C4.03 12.26 4 12.61 4 13c0 .39.03.74.07 1.08L1.7 15.9c-.21.16-.27.46-.13.7l2.2 3.81c.13.25.42.33.67.25l2.74-1.1c.57.44 1.18.81 1.86 1.08l.42 2.92c.04.24.29.42.54.42h4c.25 0 .5-.18.54-.42l.42-2.92c.68-.27 1.29-.64 1.86-1.08l2.74 1.1c.25.08.54 0 .67-.25l2.2-3.81c.14-.24.08-.54-.13-.7l-2.32-1.82z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Picker Strip -->
  <div class="picker-strip">
    <div class="exercise-chip" role="button" aria-label="Übung wechseln">
      <span>Putten 1m</span>
      <span class="exercise-chip__label">·&nbsp;10 Bälle</span>
      <span class="exercise-chip__caret">▾</span>
    </div>
  </div>

  <!-- Recording Area -->
  <div class="recording-area">

    <div class="counter-grid">

      <!-- 1-Putt: 7 (active — dominant result) -->
      <div class="counter-cell counter-cell--active" role="group" aria-label="1-Putt: 7">
        <div class="counter-cell__dot"></div>
        <span class="counter-cell__label">1-Putt</span>
        <div class="counter-cell__controls">
          <button class="counter-btn counter-btn--minus" aria-label="Weniger">−</button>
          <span class="counter-cell__value">7</span>
          <button class="counter-btn counter-btn--plus" aria-label="Mehr">+</button>
        </div>
      </div>

      <!-- 2-Putts: 2 -->
      <div class="counter-cell" role="group" aria-label="2-Putts: 2">
        <div class="counter-cell__dot"></div>
        <span class="counter-cell__label">2-Putts</span>
        <div class="counter-cell__controls">
          <button class="counter-btn counter-btn--minus" aria-label="Weniger">−</button>
          <span class="counter-cell__value">2</span>
          <button class="counter-btn counter-btn--plus" aria-label="Mehr">+</button>
        </div>
      </div>

      <!-- 3-Putts: 1 -->
      <div class="counter-cell" role="group" aria-label="3-Putts: 1">
        <div class="counter-cell__dot"></div>
        <span class="counter-cell__label">3-Putts</span>
        <div class="counter-cell__controls">
          <button class="counter-btn counter-btn--minus" aria-label="Weniger">−</button>
          <span class="counter-cell__value">1</span>
          <button class="counter-btn counter-btn--plus" aria-label="Mehr">+</button>
        </div>
      </div>

      <!-- 4+-Putts: 0 -->
      <div class="counter-cell counter-cell--zero" role="group" aria-label="4+-Putts: 0">
        <div class="counter-cell__dot"></div>
        <span class="counter-cell__label">4+-Putts</span>
        <div class="counter-cell__controls">
          <button class="counter-btn counter-btn--minus" aria-label="Weniger" disabled style="opacity:0.3;cursor:default">−</button>
          <span class="counter-cell__value">0</span>
          <button class="counter-btn counter-btn--plus" aria-label="Mehr">+</button>
        </div>
      </div>

    </div><!-- /counter-grid -->

    <!-- Progress indicator -->
    <div class="progress-row">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:100%"></div>
      </div>
      <span class="progress-label progress-label--complete">10 / 10 Bälle</span>
      <span class="progress-checkmark">✓</span>
    </div>

  </div><!-- /recording-area -->

  <!-- Footer Action Bar -->
  <div class="footer-bar">
    <button class="btn-save">Speichern</button>
    <a class="footer-stat-link" href="#" aria-label="Zur Statistik">
      Statistik
      <span>→</span>
    </a>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-item tab-item--active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      <span>Putten</span>
    </button>
    <button class="tab-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M12 3l9 9-9 9"/></svg>
      <span>Range</span>
    </button>
  </nav>

  <!-- iOS Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator__bar"></div>
  </div>

</div><!-- /phone -->
</div><!-- /phone-frame -->
</body>
</html>
