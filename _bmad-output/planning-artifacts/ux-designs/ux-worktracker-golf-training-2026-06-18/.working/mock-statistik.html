<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>Statistik · Putten 1m</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #2e7d32;
      --primary-dark:   #1b5e20;
      --primary-light:  #e8f5e9;
      --surface:        #f4f6f4;
      --card:           #ffffff;
      --divider:        #e2e6e2;
      --text-primary:   #1c241c;
      --text-muted:     #6b766b;
      --r-sm: 6px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-pill: 999px;
    }

    html, body {
      width: 390px;
      min-height: 844px;
      background: var(--surface);
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Sticky Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 56px;
      background: var(--card);
      border-bottom: 1px solid var(--divider);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 16px;
    }
    .header__back {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--primary);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      justify-self: start;
    }
    .header__back svg {
      width: 18px;
      height: 18px;
      stroke: var(--primary);
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .header__title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      white-space: nowrap;
    }
    .header__title span {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .header__right {
      justify-self: end;
    }

    /* ── Scrollable content ── */
    .content {
      padding: 20px 16px;
      padding-bottom: 100px; /* clear tab bar */
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Stats summary grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--r-md);
      padding: 16px 14px 14px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 0 0 1px var(--divider);
    }
    .stat-card.highlight {
      background: var(--primary-light);
      box-shadow: 0 1px 3px rgba(46,125,50,.12), 0 0 0 1px rgba(46,125,50,.18);
    }
    .stat-card__number {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
      letter-spacing: -0.5px;
    }
    .stat-card.highlight .stat-card__number {
      color: var(--primary-dark);
    }
    .stat-card__label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
      line-height: 1.3;
    }

    /* ── Section heading ── */
    .section-heading {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    /* ── Trend chart ── */
    .chart-section {}
    .chart-card {
      background: var(--card);
      border-radius: var(--r-md);
      padding: 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 0 0 1px var(--divider);
    }
    .chart-wrap {
      position: relative;
      width: 100%;
    }
    .chart-wrap svg {
      display: block;
      width: 100%;
    }

    /* ── History list ── */
    .history-section {}
    .history-card {
      background: var(--card);
      border-radius: var(--r-md);
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 0 0 1px var(--divider);
      overflow: hidden;
    }
    .history-row {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 13px 16px;
    }
    .history-row + .history-row {
      border-top: 1px solid var(--divider);
    }
    .history-row__date {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .history-row__dist {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .dist-chip {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      background: var(--primary-light);
      border-radius: var(--r-pill);
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 600;
      color: var(--primary-dark);
    }
    .dist-chip .chip-label {
      font-size: 10px;
      font-weight: 400;
      color: var(--text-muted);
      margin-left: 1px;
    }
    .history-row__total {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: right;
      white-space: nowrap;
    }
    .history-row__total span {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      display: block;
      text-align: right;
    }

    /* ── Bottom tab bar ── */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 390px;
      height: 64px;
      background: var(--card);
      border-top: 1px solid var(--divider);
      display: flex;
      align-items: stretch;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      padding-bottom: 6px;
    }
    .tab__icon {
      font-size: 22px;
      line-height: 1;
    }
    .tab__label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .tab.active .tab__label {
      color: var(--primary);
      font-weight: 600;
    }
    .tab.active .tab__icon {
      /* subtle glow */
      filter: drop-shadow(0 0 4px rgba(46,125,50,.35));
    }
    .tab-indicator {
      position: absolute;
      bottom: 0;
      height: 2.5px;
      width: calc(100% / 2);
      background: var(--primary);
      border-radius: 2px 2px 0 0;
      left: 0;
      transition: left .2s;
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════
     HEADER
════════════════════════════════════════ -->
<header class="header">
  <button class="header__back">
    <!-- chevron-left -->
    <svg viewBox="0 0 24 24">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Zurück
  </button>

  <div class="header__title">
    Statistik
    <span>Putten · 1 m</span>
  </div>

  <div class="header__right"></div>
</header>

<!-- ════════════════════════════════════════
     CONTENT
════════════════════════════════════════ -->
<main class="content">

  <!-- ── Stats summary 2×2 ── -->
  <section>
    <div class="stats-grid">

      <div class="stat-card">
        <div class="stat-card__number">3</div>
        <div class="stat-card__label">Sessions</div>
      </div>

      <div class="stat-card highlight">
        <div class="stat-card__number">10</div>
        <div class="stat-card__label">Bestwert Putts</div>
      </div>

      <div class="stat-card">
        <div class="stat-card__number">11.7</div>
        <div class="stat-card__label">Ø Putts pro Session</div>
      </div>

      <div class="stat-card highlight">
        <div class="stat-card__number">100%</div>
        <div class="stat-card__label">1-Putt-Quote</div>
      </div>

    </div>
  </section>

  <!-- ── Trend chart ── -->
  <section class="chart-section">
    <div class="section-heading">Verlauf</div>
    <div class="chart-card">
      <div class="chart-wrap">
        <!--
          Chart dimensions:  358 × 140 (card inner width × height)
          Y range:  9 – 16  → 7 units  →  1 unit = (120 - 20) / 7 ≈ 14.3px
          Data points (putts): 10, 10, 15
          Y positions (top=0 → low values at top):
            y_offset_top = 20 (padding top)  y_offset_bot = 120 (padding bot area ends here)
            usable_h = 100
            unit_h = 100 / 7 ≈ 14.29
            10 → (16-10)/7 * 100 + 20 = 6/7*100+20 = 85.7+20 = 105.7  ... wait, higher value = more putts = lower is better?
            Actually treat y-axis as: max=16 at top, min=9 at bottom
            value=10: y = 20 + (16-10)/(16-9) * 100 = 20 + 6/7*100 = 20 + 85.7 = 105.7  → closer to bottom (more putts than min)
            Hmm, that renders 10 near bottom (good: low putts = near bottom? no — standard chart: higher value higher up)
            Standard: min at bottom, max at top
            value=10: y = 20 + (1 - (10-9)/(16-9)) * 100 = 20 + (1 - 1/7)*100 = 20 + 85.7 = 105.7
            value=15: y = 20 + (1 - (15-9)/(16-9)) * 100 = 20 + (1 - 6/7)*100 = 20 + 14.3 = 34.3
          X positions: 3 points evenly spaced, padding 40px each side
            x1 = 40, x2 = 179, x3 = 318
        -->
        <svg viewBox="0 0 358 148" xmlns="http://www.w3.org/2000/svg">

          <!-- Y-axis labels -->
          <text x="14" y="42" font-size="10" fill="#6b766b" font-family="system-ui" text-anchor="end">16</text>
          <text x="14" y="122" font-size="10" fill="#6b766b" font-family="system-ui" text-anchor="end">9</text>

          <!-- Horizontal grid lines (subtle) -->
          <line x1="20" y1="38" x2="338" y2="38" stroke="#e2e6e2" stroke-width="1"/>
          <line x1="20" y1="120" x2="338" y2="120" stroke="#e2e6e2" stroke-width="1"/>

          <!-- Gradient fill under the line -->
          <defs>
            <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stop-color="#2e7d32" stop-opacity="0.18"/>
              <stop offset="100%" stop-color="#2e7d32" stop-opacity="0.0"/>
            </linearGradient>
          </defs>

          <!-- Area fill -->
          <!-- Points: (40, 105.7), (179, 105.7), (318, 34.3) -->
          <path
            d="M40,105.7 L179,105.7 L318,34.3 L318,120 L179,120 L40,120 Z"
            fill="url(#areaGrad)"
          />

          <!-- Line -->
          <polyline
            points="40,105.7 179,105.7 318,34.3"
            fill="none"
            stroke="#2e7d32"
            stroke-width="2.5"
            stroke-linejoin="round"
            stroke-linecap="round"
          />

          <!-- Data point dots -->
          <circle cx="40"  cy="105.7" r="4.5" fill="#2e7d32" stroke="white" stroke-width="2"/>
          <circle cx="179" cy="105.7" r="4.5" fill="#2e7d32" stroke="white" stroke-width="2"/>
          <circle cx="318" cy="34.3"  r="4.5" fill="#2e7d32" stroke="white" stroke-width="2"/>

          <!-- Value labels above dots -->
          <text x="40"  y="100" font-size="11" font-weight="600" fill="#2e7d32" font-family="system-ui" text-anchor="middle">10</text>
          <text x="179" y="100" font-size="11" font-weight="600" fill="#2e7d32" font-family="system-ui" text-anchor="middle">10</text>
          <text x="318" y="28"  font-size="11" font-weight="600" fill="#2e7d32" font-family="system-ui" text-anchor="middle">15</text>

          <!-- X-axis baseline -->
          <line x1="20" y1="120" x2="338" y2="120" stroke="#cdd1cd" stroke-width="1"/>

          <!-- X-axis date labels -->
          <text x="40"  y="136" font-size="10" fill="#6b766b" font-family="system-ui" text-anchor="middle">18.06</text>
          <text x="179" y="136" font-size="10" fill="#6b766b" font-family="system-ui" text-anchor="middle">18.06</text>
          <text x="318" y="136" font-size="10" fill="#6b766b" font-family="system-ui" text-anchor="middle">18.06</text>

        </svg>
      </div>
    </div>
  </section>

  <!-- ── History list ── -->
  <section class="history-section">
    <div class="section-heading">Letzte Sessions</div>
    <div class="history-card">

      <!-- Row 1 -->
      <div class="history-row">
        <div class="history-row__date">18.06.26</div>
        <div class="history-row__dist">
          <span class="dist-chip">7 <span class="chip-label">1×</span></span>
          <span class="dist-chip">2 <span class="chip-label">2×</span></span>
          <span class="dist-chip">1 <span class="chip-label">3×</span></span>
          <span class="dist-chip">0 <span class="chip-label">4+</span></span>
        </div>
        <div class="history-row__total">10 <span>Putts</span></div>
      </div>

      <!-- Row 2 -->
      <div class="history-row">
        <div class="history-row__date">18.06.26</div>
        <div class="history-row__dist">
          <span class="dist-chip">7 <span class="chip-label">1×</span></span>
          <span class="dist-chip">2 <span class="chip-label">2×</span></span>
          <span class="dist-chip">1 <span class="chip-label">3×</span></span>
          <span class="dist-chip">0 <span class="chip-label">4+</span></span>
        </div>
        <div class="history-row__total">10 <span>Putts</span></div>
      </div>

      <!-- Row 3 -->
      <div class="history-row">
        <div class="history-row__date">18.06.26</div>
        <div class="history-row__dist">
          <span class="dist-chip">1 <span class="chip-label">1×</span></span>
          <span class="dist-chip">5 <span class="chip-label">2×</span></span>
          <span class="dist-chip">3 <span class="chip-label">3×</span></span>
          <span class="dist-chip">1 <span class="chip-label">4+</span></span>
        </div>
        <div class="history-row__total">15 <span>Putts</span></div>
      </div>

    </div>
  </section>

</main>

<!-- ════════════════════════════════════════
     BOTTOM TAB BAR
════════════════════════════════════════ -->
<nav class="tab-bar">
  <div class="tab-indicator"></div>

  <!-- Tab 1: Putten (active) -->
  <div class="tab active">
    <div class="tab__icon">🥅</div>
    <div class="tab__label">Putten</div>
  </div>

  <!-- Tab 2: Range (inactive) -->
  <div class="tab">
    <div class="tab__icon">🎯</div>
    <div class="tab__label">Range</div>
  </div>
</nav>

</body>
</html>
