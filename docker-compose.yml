services:
  app:
    build: .
    image: worktracker
    container_name: worktracker
    ports:
      - "8080:8000"
    volumes:
      # Persist the SQLite database outside the container
      - ./data:/app/data
    environment:
      - WT_DB=/app/data/worktracker.db
      # Needed for /api/analyze-putt (Claude VLM). Set in your shell or a .env file.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
